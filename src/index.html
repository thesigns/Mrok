<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Mrok</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        <link rel="stylesheet" href="./css/default.css?v=2">
        <link rel="manifest" href="manifest.json">
        <script type="module" src="./js/main.js" ></script>
    </head>
    <body>
        <main>
            <div id="menu-screen" hidden>
                <div class="menu-side">
                    <button class="menu-btn" id="btn-back">Back to game</button>
                </div>
                <img src="./gfx/title.png" class="menu-title">
                <div class="menu-side">
                    <button class="menu-btn" id="btn-install" hidden>Install app</button>
                    <button class="menu-btn" id="btn-quit">Quit game</button>
                </div>
            </div>
            <div id="game-screen">
                <div id="panel-left">
                    <canvas id="minimap" width="210" height="138"></canvas>
                    <div class="compass">
                        <div class="btn" data-dx="-1" data-dy="-1" data-key="Q"><img src="./gfx/gui/icon-nw.png"></div>
                        <div class="btn" data-dx="0" data-dy="-1" data-key="W"><img src="./gfx/gui/icon-n.png"></div>
                        <div class="btn" data-dx="1" data-dy="-1" data-key="E"><img src="./gfx/gui/icon-ne.png"></div>
                        <div class="btn" data-dx="-1" data-dy="0" data-key="A"><img src="./gfx/gui/icon-w.png"></div>
                        <div class="btn" data-dx="0" data-dy="0" data-key="S"><img src="./gfx/gui/icon-wait.png"></div>
                        <div class="btn" data-dx="1" data-dy="0" data-key="D"><img src="./gfx/gui/icon-e.png"></div>
                        <div class="btn" data-dx="-1" data-dy="1" data-key="Z"><img src="./gfx/gui/icon-sw.png"></div>
                        <div class="btn" data-dx="0" data-dy="1" data-key="X"><img src="./gfx/gui/icon-s.png"></div>
                        <div class="btn" data-dx="1" data-dy="1" data-key="C"><img src="./gfx/gui/icon-se.png"></div>
                    </div>
                </div>
                <div class="viewport-wrap">
                    <canvas width="360" height="360"></canvas>
                    <div id="infobox"></div>
                </div>
                <div id="panel-right">
                    <div id="stats">Hit Points: 100</div>
                    <div class="button-grid">
                        <div class="btn" data-key="T">?</div>
                        <div class="btn" data-key="Y">?</div>
                        <div class="btn" data-key="U">?</div>
                        <div class="btn" data-key="G">?</div>
                        <div class="btn" id="btn-handle" data-key="H"><img src="./gfx/gui/icon-handle.png"></div>
                        <div class="btn" data-key="J">?</div>
                        <div class="btn" data-key="B">?</div>
                        <div class="btn" data-key="N">?</div>
                        <div class="btn" id="btn-menu" data-key="M"><img src="./gfx/gui/icon-menu.png"></div>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
